<!--register.html-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>smarycity - register </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/styles.css">
</head>
  <body class="auth-page">
    <div class="main min-vh-100 d-flex align-items-center justify-content-center auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                    <div class="card auth-card shadow-lg border-0">
                        <div class="card-body p-4 p-md- p-md-5">
                            <div class="text-center mb-4">
                                <div class="brand-badge mb-3">
                                    <i class="bi bi-person-plus"></i>
                                </div>
                                <h1 class="h3 fw-bold mb-2">registrate en smart city</h1>
                                <p class="text-secondary">crea una cuenta para consultar informacion de tu ciudad</p>
                                <div id="registeralert" class="alert alert-danger d-none"></div>
                                <form id="registerform" novalidate>
                                    <!--nombre completo-->
                                        <div class="mb-3">
                                        <label for="nombreCompleto" class="form-label">nombre completo</label>
                                        <input type="text" class="form-control" id="nombreCompleto" placeholder="nombre completo" required>
                                    </div>
                                    <!--correo electronico-->
                                    <div class="mb-3">
                                        <label for="registerEmail" class="form-label">correo electronico</label>
                                        <input type="email" class="form-control" id="registerEmail" placeholder="correo electronico" required>
                                    </div>
                                     <!--ciudad favorita-->
                                    <div class="mb-3">
                                        <label for="ciudadFavorita" class="form-label">ciudad favorita</label>
                                        <input type="text" class="form-control" id="ciudadFavorita" placeholder="ciudad favorita" required>
                                    </div>
                                        <!--contraseña-->
                                    <div class="mb-3">
                                        <label for="Password" class="form-label">contraseña</label>
                                        <input type="password" class="form-control" id="Password" required>
                                    </div>
                                        <!--confirmar contraseña-->
                                    <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">confirmar contraseña</label>
                                        <input type="password" class="form-control" id="confirmPassword" required>
                                    </div>

                                    <div class="d-grid mb-3">
                                        <button class="btn btn-primary btn-lg" type="submit">
                                            <i class="bi bi-person-check me-2"></i>
                                            crear cuenta 
                                        </button>
                                    </div>
                                    <div class="text-center">
                                        <p class="mb-0">¿ya tienes una cuenta? <a href="login.html">inicia sesion</a></p>

                                    </div>
                                </form>


                            </div>
                        </div>
                        <p class="text-center text-muted mt-3 small"> 2026 citysmart
                            </p> 
                    </div>
                </div>
            </div>
        </div>

    <p>redirige a city - smart</p>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 <script src="./js/app.js"></script>
 <script src="./js/register.js"></script>
</body>
</html>

<!--dashboard.html-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>smart city dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css">
</head>
  <body class="dashbord-page">
   <!--navbar-->
   <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a href="#" class="navbar-brand fw-bold">
            <i class="bi bi-buildings"></i>
            smart city
        </a>
        <div class="ms-auto">
            <button id="logoutBtn" class="btn btn-outline-light">
                <i class="bi bi-box-arrow-right me-2"></i>
                cerrar sesion
            </button>
        </div>
    </div>
   </nav>

<!--contenido-->
<div class="container my-5">
    <div class="mb-4">
        <h2 class="fw-bold">bienbenido,
            <span id="username">usuario</span>
        </h2>
        <p class="text-secondary">panel de informacion ciudadana</p>
    </div>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card card-info text-center">
                <div class="card-body">
                    <i class="bi bi-cloud-sun display-5 text-primary mb-3"></i>
                    <h5 class="card-title">clima</h5>
                    <p class="card-text">informacion meteorologica en tiempo real</p>
                </div>
            </div>
        </div>

         <div class="col-md-4">
            <div class="card card-info text-center">
                <div class="card-body">
                    <i class="bi bi-newspaper display-5 text-success mb-3"></i>
                    <h5 class="card-title">noticias</h5>
                    <p class="card-text">ultimas noticias de tu ciudad</p>
                </div>
            </div>
        </div>

         <div class="col-md-4">
            <div class="card card-info text-center">
                <div class="card-body">
                    <i class="bi bi-wind display-5 text-warning mb-3"></i>
                    <h5 class="card-title">calidad del aire</h5>
                    <p class="card-text">indicadores ambientales</p>
                </div>
            </div>
        </div>


    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="./js/app.js"></script>
<script src="./js/dashboard.js"></script>
</body>
</html>
